<!DOCTYPE html>
<html>
<head>
<title>Doon Packaging Solutions</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

.container{
padding:20px;
}

.section{
background:#111827;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h2{
color:#38bdf8;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
padding:10px;
background:#1f2937;
border-radius:6px;
}

button{
background:#38bdf8;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
color:black;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}

.total{
font-size:20px;
color:#22c55e;
margin-top:10px;
}

.order-btn{
background:#22c55e;
padding:12px;
width:100%;
font-size:16px;
margin-top:10px;
}
</style>

</head>

<body>

<header>
Doon Packaging Solutions
</header>

<div class="container">

<div class="section">
<h2>Products</h2>
<div id="products"></div>
</div>

<div class="section">
<h2>Cart</h2>
<div id="cart"></div>
<div class="total" id="total">Total: ₹0</div>
</div>

<div class="section">
<h2>Customer Details</h2>
<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="phone" placeholder="Enter Phone Number">

<button class="order-btn" onclick="order()">Order on WhatsApp</button>
</div>

</div>

<script>

let products = [
{name:"3 Ply Brown Boxes",price:95},
{name:"7 Ply Corrugated Boxes",price:175},
{name:"Cardboard Boxes",price:140},
{name:"Folding Cartons",price:90},
{name:"Laminated Cartons",price:95},
{name:"Corrugated Pizza Boxes",price:14},

{name:"Shopping Packets",price:6},
{name:"Plastic Bags",price:140},

{name:"Bubble Wrap",price:990},
{name:"Bubble Roll",price:850},
{name:"Foam Sheets",price:3600},
{name:"Thermocol",price:27},
{name:"Packing Paper",price:30},

{name:"Stretch Wrap",price:840},
{name:"Shrink Wrap",price:1200},
{name:"Laminated Film",price:700},

{name:"Packing Tape",price:80},
{name:"Labels & Markers",price:20},

{name:"Corrugated Rolls",price:30}
];

let cart = {};

function loadProducts(){
let div = document.getElementById("products");
div.innerHTML = "";

products.forEach(p=>{
let item = document.createElement("div");
item.className="product";

item.innerHTML=`
<span>${p.name} - ₹${p.price}</span>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
`;

div.appendChild(item);
});
}

function addToCart(name,price){
if(cart[name]){
cart[name].qty++;
}else{
cart[name]={price:price,qty:1};
}
renderCart();
}

function renderCart(){
let div = document.getElementById("cart");
div.innerHTML="";

let total = 0;

for(let i in cart){
let item = cart[i];
total += item.price * item.qty;

let el = document.createElement("div");
el.className="product";

el.innerHTML=`
<span>${i} x ${item.qty}</span>
<span>₹${item.price * item.qty}</span>
`;

div.appendChild(el);
}

document.getElementById("total").innerText = "Total: ₹" + total;
return total;
}

function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Please fill details");
return;
}

let total = renderCart();

let msg = "🧾 *ORDER BILL*%0A%0A";
msg += "👤 Name: " + name + "%0A";
msg += "📞 Phone: " + phone + "%0A%0A";
msg += "🛒 Items:%0A";

for(let i in cart){
msg += "- " + i + " x " + cart[i].qty + " = ₹" + (cart[i].price * cart[i].qty) + "%0A";
}

msg += "%0A💰 Total: ₹" + total + "%0A";
msg += "%0APlease confirm my order.";

let url = "https://wa.me/917017670100?text=" + msg;

window.open(url);

}

loadProducts();

</script>

</body>
</html>
